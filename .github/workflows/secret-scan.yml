name: secret-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@3fc0c2aa6648d54242e4af6fbfde0701796e4fb0 # main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # The action already passes --no-update internally; passing it
          # again here triggers `flag 'no-update' cannot be repeated`.
          extra_args: --only-verified

  semgrep:
    runs-on: ubuntu-24.04
    container:
      image: returntocorp/semgrep@sha256:7810f1d7884974ab6dda7bef8f4a2c8e165ea2142fd8260515d380e4f1407263
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Semgrep (auto config + secrets + supply-chain)
        # `semgrep ci` already exits non-zero on findings; the `--error`
        # flag exists on `semgrep scan` but not `semgrep ci`.
        run: |
          semgrep ci \
            --config p/ci \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --config p/typescript
