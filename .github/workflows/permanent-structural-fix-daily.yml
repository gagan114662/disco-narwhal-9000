name: permanent-structural-fix-daily

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  permanent-structural-fix:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ci-test-key
    defaults:
      run:
        working-directory: "src 2"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Run permanent structural fix loop
        run: bun run structural-fix:daily

      - name: Run static production proof gates
        run: bun run proof:static
