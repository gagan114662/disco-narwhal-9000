name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        bun-version: ['1.3.11']
        include:
          - os: ubuntu-24.04
            bun-version: latest
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    env:
      ANTHROPIC_API_KEY: ci-test-key
    defaults:
      run:
        working-directory: "src 2"
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Run production pipeline (scoped lint + typecheck + build + smokes)
        run: bun run pipeline

      - name: Full-tree typecheck against baseline
        run: bun run typecheck:full

      - name: Full-tree lint against baseline
        run: bun run lint:full

      - name: Run full test suite (no coverage instrumentation)
        run: bun test

      # Coverage instrumentation currently surfaces a pre-existing import
      # bug (`isReplBridgeActive` missing from bootstrap/state.ts). The gate
      # is wired up so coverage gets uploaded as an artifact and reported on
      # PRs, but is non-blocking until the missing export is fixed. Once it
      # is, drop continue-on-error.
      - name: Run full test suite with coverage (gate, currently advisory)
        id: coverage
        continue-on-error: true
        run: bun run test:coverage

      - name: Bundle artifact verification (size + externals + startup)
        run: bun run bundle:budget

      - name: Bundle reproducibility check
        if: matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        run: bun run bundle:reproducibility

      - name: Performance benchmark (dashboard cold-start + reminder tick)
        if: matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        run: bun run perf:bench

      - name: Dashboard E2E (real HTTP server, real fetches)
        if: matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        run: bun run e2e:dashboard

      - name: License policy check
        if: matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        run: bun run license:check

      - name: Run static production proof gates
        run: bun run proof:static

      - name: Upload coverage report
        if: always() && matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: src 2/coverage/
          if-no-files-found: warn

      - name: Upload bundle + e2e snapshot
        if: always() && matrix.os == 'ubuntu-24.04' && matrix.bun-version == '1.3.11'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-artifacts
          path: |
            src 2/dist/cli.js
            src 2/dist/dashboard-e2e-snapshot.json
          if-no-files-found: warn

  # Umbrella job whose name matches the existing branch-protection required
  # context `verify`. Every individual matrix job is reported as
  # `verify-matrix (<os>, <bun-version>[, <experimental>])`, which doesn't
  # match the required-checks list. This one fans-in their results so the
  # rule can stay configured against a single, stable name.
  verify:
    needs: verify-matrix
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Verify all required matrix variants succeeded
        env:
          MATRIX_RESULT: ${{ needs.verify-matrix.result }}
        run: |
          echo "verify-matrix result: $MATRIX_RESULT"
          # `success` is required. `skipped` and `failure` both block; the
          # bun-latest variant is allowed to fail via continue-on-error so it
          # does not flip the aggregate to failure.
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "::error::verify-matrix did not succeed (result=$MATRIX_RESULT)"
            exit 1
          fi
          echo "All required verify-matrix variants succeeded."
