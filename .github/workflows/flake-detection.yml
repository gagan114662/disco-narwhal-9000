name: flake-detection

on:
  schedule:
    - cron: '11 6 * * *'
  pull_request:
    paths:
      - 'src 2/**/*.test.ts'
      - 'src 2/**/*.test.tsx'
      - 'src 2/scripts/**'
      - '.github/workflows/flake-detection.yml'
  workflow_dispatch:
    inputs:
      reruns:
        description: 'Number of test re-runs'
        required: false
        default: '3'

permissions:
  contents: read

jobs:
  rerun-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ci-test-key
      RERUNS: ${{ github.event.inputs.reruns || '3' }}
    defaults:
      run:
        working-directory: "src 2"
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Re-run tests N times
        run: |
          set -e
          fails=0
          for i in $(seq 1 "$RERUNS"); do
            echo "::group::run #$i"
            if ! bun test --rerun-each=1 2>&1 | tee "/tmp/run-$i.log"; then
              fails=$((fails+1))
              echo "run #$i FAILED"
            fi
            echo "::endgroup::"
          done
          if [ "$fails" -gt 0 ]; then
            echo "::error::$fails of $RERUNS runs failed - flaky tests detected"
            exit 1
          fi
          echo "all $RERUNS runs passed"

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flake-detection-logs
          path: /tmp/run-*.log
          if-no-files-found: warn
