name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-attest:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ci-test-key
    defaults:
      run:
        working-directory: "src 2"
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full pipeline + tests
        run: |
          bun run pipeline
          bun run test:coverage
          bun run typecheck:full
          bun run lint:full
          bun run bundle:budget
          bun run bundle:reproducibility
          bun run license:check

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign bundle (keyless / Sigstore)
        run: |
          cd "src 2"
          cosign sign-blob --yes \
            --output-signature dist/cli.js.sig \
            --output-certificate dist/cli.js.pem \
            dist/cli.js
        working-directory: ${{ github.workspace }}

      - name: Generate SHA256 checksum
        working-directory: "src 2"
        run: |
          sha256sum dist/cli.js > dist/cli.js.sha256
          cat dist/cli.js.sha256

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "src 2/dist/cli.js"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ github.ref_name }}
          path: |
            src 2/dist/cli.js
            src 2/dist/cli.js.sha256
            src 2/dist/cli.js.sig
            src 2/dist/cli.js.pem
