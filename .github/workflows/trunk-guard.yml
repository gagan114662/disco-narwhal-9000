name: trunk-guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  block-trunk-changes:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Verify trunk-pattern fixtures
        working-directory: "src 2"
        run: |
          bun install --frozen-lockfile
          bun test ./scripts/trunkPatterns.test.ts

      - name: Detect trunk file changes
        id: detect
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Three-dot diff: only files changed in commits unique to the PR
          # branch since its divergence from base.
          git diff --name-only "$BASE...$HEAD" > /tmp/changed.txt
          echo "Changed files:"
          cat /tmp/changed.txt
          # Run the pattern check via the shared TS module so the workflow
          # and the tested code use the same source of truth.
          if (cd "src 2" && bun ./scripts/trunkPatterns.ts check /tmp/changed.txt) > /tmp/hits.txt; then
            echo "no trunk hits"
          else
            echo "trunk_hits<<EOF" >> "$GITHUB_OUTPUT"
            cat /tmp/hits.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for override label
        id: label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            core.setOutput('approved', labels.includes('trunk-change-approved'));

      - name: Fail if trunk touched without approval
        if: steps.detect.outputs.trunk_hits != '' && steps.label.outputs.approved != 'true'
        run: |
          echo "::error::This PR modifies trunk files. Apply label 'trunk-change-approved' to allow."
          echo "Trunk files changed:"
          echo "${{ steps.detect.outputs.trunk_hits }}"
          exit 1
