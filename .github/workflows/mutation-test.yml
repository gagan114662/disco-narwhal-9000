name: mutation-test

on:
  schedule:
    - cron: '47 7 * * *'
  workflow_dispatch:
    inputs:
      paths:
        description: 'Override mutate paths (comma separated)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ci-test-key
    defaults:
      run:
        working-directory: "src 2"
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run StrykerJS (critical modules)
        run: bun run stryker

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-report
          path: src 2/reports/mutation/
          if-no-files-found: warn
