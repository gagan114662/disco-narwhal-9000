version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/src 2"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "eslint"
        versions: [">=10"]
      - dependency-name: "ink"
        versions: [">=6"]
      - dependency-name: "typescript"
        versions: [">=6"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "actions/checkout"
        versions: [">=6"]
