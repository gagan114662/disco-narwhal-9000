name: Bug / regression
description: Capture a concrete failure mode with enough detail to reproduce and verify.
title: "[bug] "
body:
  - type: markdown
    attributes:
      value: |
        Use this for broken behavior, regressions, or user-visible mismatches between expected and actual behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is failing now, and what should happen instead?
      placeholder: Describe the repro, the current bad behavior, and the expected result.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User/Developer Impact
      description: Who is affected, how often, and how badly?
      placeholder: Explain the broken workflow, frequency, and severity of the failure.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in bounds for the fix?
      placeholder: Limit the issue to the bug fix, guardrails, and tests needed to keep it fixed.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What should not be bundled into this bug fix?
      placeholder: List unrelated cleanup, larger refactors, or adjacent bugs that should stay separate.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know the regression is actually fixed?
      placeholder: |
        - [ ] Repro no longer fails
        - [ ] Expected behavior is explicit and testable
    validations:
      required: true
  - type: textarea
    id: suggested_entry_points
    attributes:
      label: Suggested Entry Points
      description: Where should the investigation start?
      placeholder: Point to the failing command, screen, file, log path, or test that best exposes the bug.
    validations:
      required: true
  - type: textarea
    id: verification_test_plan
    attributes:
      label: Verification / Test Plan
      description: What exact repro and validation steps should be run?
      placeholder: Include both the failing-before-fix repro and the final confirmation steps.
    validations:
      required: true
  - type: dropdown
    id: trunk_expectations
    attributes:
      label: Trunk Expectations
      description: Does the bug fix stay within trunk-safe boundaries?
      options:
        - trunk-safe
        - trunk-touch
    validations:
      required: true
